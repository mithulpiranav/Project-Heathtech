<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body style="text-align:center; font-family:Californian FB;">

<h2>Welcome {{ name }}</h2>

<form method="POST">
    <input type="number" step="0.1" name="weight" placeholder="Weight (kg)" required><br><br>
    <input type="number" step="0.01" name="height" placeholder="Height (m)" min="0.5" required><br><br>

    <input type="number" name="food" placeholder="Food intake (calories)" required><br><br>
    <input type="number" name="steps" placeholder="Steps Walked" required><br><br>
    <input type="number" step="0.1" name="sleep" placeholder="Sleep (hours)" required><br><br>

    <button type="submit">Calculate</button>
</form>

{% if result %}
    <h3>Glucose Level (est.): {{ glucose }} mg/dL</h3>
    <h3>Calories Burnt: {{ calories_burnt }}</h3>
    <h3>Predicted Burn: {{ predicted_burn }}</h3>
    <h3>Body Mass Index: {{ bmi }}</h3>
    <h3>Body Fat %: {{ body_fat }}</h3>
{% endif %}
{% if graph %}
    <img src="{{ url_for('static', filename=graph) }}" width="500">
{% endif %}

<br><br>
<a href="/logout">Logout</a>

</body>
</html>
