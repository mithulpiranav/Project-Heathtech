<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 30px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
        }
        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        img {
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Welcome {{ name }}</h2>

    <form method="POST">
        <input type="number" step="0.1" name="weight" placeholder="Weight (kg)" required>
        <input type="number" step="0.01" name="height" placeholder="Height (m)" required>

        <input type="number" name="food" placeholder="Food Intake (calories)" required>
        <input type="number" name="steps" placeholder="Steps Walked" required>
        <input type="number" step="0.1" name="sleep" placeholder="Sleep (hours)" required>

        <button type="submit">Calculate</button>
    </form>

    {% if result %}
        <h3>Glucose Level: {{ result }}</h3>
        <h3>Calories Burnt: {{ calories_burnt }}</h3>
        <h3>Predicted Burn (if +1000 steps): {{ predicted_burn }}</h3>

        <h3>BMI: {{ bmi }}</h3>
        <h3>Body Fat %: {{ body_fat }}</h3>

        <img src="{{ graph }}" alt="Graph">
    {% endif %}

    <br>
    <a href="/logout">Logout</a>
</div>

</body>
</html>
