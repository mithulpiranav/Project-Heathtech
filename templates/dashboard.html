<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 40px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input, button {
            padding: 10px;
            margin: 8px;
            width: 80%;
        }

        button {
            background-color: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">

<h2>Welcome {{ name }} (Age: {{ age }})</h2>

<form method="POST">
    <input type="number" name="food" placeholder="Calories Intake" required><br>
    <input type="number" name="steps" placeholder="Steps Walked" required><br>
    <input type="number" name="sleep" placeholder="Sleep Hours" required><br>

    <button type="submit">Analyze</button>
</form>

{% if result %}
<hr>

<h3>Predicted Glucose: {{ result }}</h3>
<h3>Calories Burnt: {{ calories_burnt }}</h3>

<h3>If you walk 2000 more steps:</h3>
<h3>Calories Burnt: {{ predicted_burn }}</h3>

<img src="{{ graph }}" width="300">

{% endif %}

</div>

</body>
</html>
